<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SQL ERD Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tip {
            color: #94a3b8;
            font-size: 14px;
            font-style: italic;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid #334155;
            padding: 10px;
            font-family: monospace;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #1d4ed8; }

        svg {
            width: 100%;
            height: 1200px;
            border: 1px solid #1e293b;
            background: #020617;
            margin-top: 15px;
            border-radius: 8px;
        }

        /* --- Excel Table Styles --- */
        .table-bg { fill: #0f172a; }
        .table-header-bg { fill: #1e3a8a; } 
        .table-subheader-bg { fill: #334155; } 
        .table-border { fill: none; stroke: #475569; stroke-width: 2; }
        .row-even { fill: #1e293b; transition: fill 0.2s; }
        .row-odd { fill: #0f172a; transition: fill 0.2s; }
        .grid-line { stroke: #475569; stroke-width: 1; }
        
        /* Text Styles */
        .title { fill: #f8fafc; font-weight: bold; font-size: 14px; font-family: 'Courier New', Courier, monospace; }
        .subheader-text { fill: #94a3b8; font-size: 11px; font-weight: bold; font-family: Arial, sans-serif; text-transform: uppercase; }
        .cell-text { fill: #cbd5e1; font-size: 12px; font-family: 'Courier New', Courier, monospace; pointer-events: none; }
        .key-text { fill: #facc15; font-weight: bold; font-size: 11px; pointer-events: none; }
        .enum-text { fill: #10b981; font-size: 11px; font-style: italic; pointer-events: none; }

        /* --- Wire Styles --- */
        .link {
            stroke: #64748b;
            stroke-width: 2.5;
            stroke-linejoin: round;
            transition: opacity 0.2s, stroke 0.2s, stroke-width 0.2s;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <h2>SQL → ERD Visualizer</h2>
        <span class="tip">💡 Hover to preview connections. Click a row to lock. Click background to clear.</span>
    </div>
    <textarea id="sqlInput" placeholder="Paste SQL schema here..."></textarea>
    <br>
    <button onclick="generate()">Generate ERD</button>
    <svg id="canvas"></svg>

<script>
        function generate() {
            try {
                let sql = document.getElementById("sqlInput").value;
                if (!sql.trim()) return alert("⚠️ Please paste some SQL schema first!");

                sql = sql.replace(/\/\*[\s\S]*?\*\//g, "").replace(/--.*$/gm, "");
                const tables = {};
                const relationships = [];
                const tableStatements = sql.split(/CREATE TABLE/i).filter(s => s.trim().length > 0);

                tableStatements.forEach(stmt => {
                    const match = stmt.match(/^\s*(?:IF NOT EXISTS\s+)?[`'"\[]?([a-zA-Z0-9_]+)[`'"\]]?\s*\(([\s\S]*)\)/i);
                    if (!match) return;

                    const tableName = match[1];
                    const body = match[2];

                    let lines = [];
                    let currentLine = "";
                    let parenCount = 0;
                    
                    for (let i = 0; i < body.length; i++) {
                        if (body[i] === '(') parenCount++;
                        if (body[i] === ')') parenCount--;
                        if (body[i] === ',' && parenCount === 0) {
                            lines.push(currentLine.trim());
                            currentLine = "";
                        } else {
                            currentLine += body[i];
                        }
                    }
                    if (currentLine.trim()) lines.push(currentLine.trim());

                    let primaryKey = null;
                    const parsedColumns = [];

                    lines.forEach(line => {
                        line = line.replace(/^[\s\uFEFF\xA0]+|[\s\uFEFF\xA0]+$/g, '');
                        if (/^PRIMARY KEY/i.test(line)) {
                            const pkMatch = line.match(/\([`'"\[]?([a-zA-Z0-9_]+)[`'"\]]?\)/);
                            if (pkMatch) primaryKey = pkMatch[1];
                        } else if (/FOREIGN KEY/i.test(line)) {
                            const fkMatch = line.match(/FOREIGN KEY\s*\([`'"\[]?([a-zA-Z0-9_]+)[`'"\]]?\)\s*REFERENCES\s*[`'"\[]?([a-zA-Z0-9_]+)[`'"\]]?\s*\([`'"\[]?([a-zA-Z0-9_]+)[`'"\]]?\)/i);
                            if (fkMatch) {
                                relationships.push({
                                    source: tableName, target: fkMatch[2],
                                    sourceCol: fkMatch[1], targetCol: fkMatch[3]
                                });
                            }
                        }
                    });

                    lines.forEach(line => {
                        line = line.replace(/^[\s\uFEFF\xA0]+|[\s\uFEFF\xA0]+$/g, '');
                        if (/^(PRIMARY KEY|FOREIGN KEY|UNIQUE|CONSTRAINT|INDEX|KEY|FULLTEXT)/i.test(line)) return;

                        let parts = line.match(/^[`'"\[]?([a-zA-Z0-9_]+)[`'"\]]?\s+([a-zA-Z_0-9]+\s*(?:[(][^)]+[)])?)(.*)$/i);
                        if (parts) {
                            let cName = parts[1];
                            let cTypeRaw = parts[2];
                            let cRest = parts[3].toUpperCase();

                            let cType = cTypeRaw;
                            let cEnum = "";
                            
                            if (cTypeRaw.toUpperCase().startsWith("ENUM")) {
                                cType = "ENUM";
                                let enumMatch = cTypeRaw.match(/\((.*)\)/);
                                if (enumMatch) cEnum = enumMatch[1].replace(/['"]/g, ""); 
                            }

                            parsedColumns.push({
                                name: cName, type: cType, enumVals: cEnum,
                                isPk: (cName === primaryKey) || cRest.includes("PRIMARY KEY")
                            });
                        }
                    });

                    tables[tableName] = { id: tableName, columns: parsedColumns };
                });

                if (Object.keys(tables).length === 0) return alert("⚠️ No tables found! Check SQL syntax.");

                relationships.forEach(l => {
                    if (!tables[l.source]) tables[l.source] = { id: l.source, columns: [] };
                    if (!tables[l.target]) tables[l.target] = { id: l.target, columns: [] };
                });

                draw(Object.values(tables), relationships);

            } catch (err) {
                console.error(err);
                alert("❌ Error parsing SQL: " + err.message);
            }
        }

        function draw(nodes, links) {
            const svg = d3.select("#canvas");
            svg.selectAll("*").remove(); 
            const container = svg.append("g");

            let lockedNode = null;

            svg.on("click", () => {
                lockedNode = null;
                resetHighlights();
            });

            svg.call(d3.zoom().on("zoom", (event) => {
                container.attr("transform", event.transform);
            }));

            const colNameW = 140, colTypeW = 120, colKeyW = 60, colEnumW = 120;
            const tableWidth = colNameW + colTypeW + colKeyW + colEnumW;

            nodes.forEach(node => {
                node.width = tableWidth; 
                node.headerHeight = 35;
                node.subHeaderHeight = 25;
                node.rowHeight = 28;
                node.height = node.headerHeight + node.subHeaderHeight + (node.columns.length * node.rowHeight); 
            });

            const numCols = Math.max(2, Math.ceil(Math.sqrt(nodes.length))); 
            const colWidth = tableWidth + 600; 
            
            // Start lower on the page to leave room for the "Skybridge" cables
            const colHeights = new Array(numCols).fill(250); 

            nodes.forEach((node) => {
                let shortestCol = 0;
                for (let c = 1; c < numCols; c++) {
                    if (colHeights[c] < colHeights[shortestCol]) shortestCol = c;
                }
                node.colIndex = shortestCol; 
                node.x = 50 + shortestCol * colWidth;
                node.y = colHeights[shortestCol];
                colHeights[shortestCol] += node.height + 250; 
            });

            // Calculate grid boundaries for Perimeter Routing
            const maxGridY = Math.max(...nodes.map(n => n.y + n.height));
            const minGridY = Math.min(...nodes.map(n => n.y));

            const linkData = links.map((link, index) => {
                const sNode = nodes.find(n => n.id === link.source);
                const tNode = nodes.find(n => n.id === link.target);
                if (!sNode || !tNode) return null;

                const sColIndex = sNode.columns.findIndex(c => c.name === link.sourceCol);
                const tColIndex = tNode.columns.findIndex(c => c.name === link.targetCol);

                const sY = sNode.y + sNode.headerHeight + sNode.subHeaderHeight + (sColIndex !== -1 ? sColIndex : 0) * sNode.rowHeight + (sNode.rowHeight / 2);
                const tY = tNode.y + tNode.headerHeight + tNode.subHeaderHeight + (tColIndex !== -1 ? tColIndex : 0) * tNode.rowHeight + (tNode.rowHeight / 2);

                const colDiff = Math.abs(sNode.colIndex - tNode.colIndex);
                let sX, tX, midX, pathD;

                if (colDiff <= 1) {
                    // --- ADJACENT OR SAME COLUMN ROUTING ---
                    // Safe to route horizontally in the gaps
                    const laneOffset = 60 + ((index * 35) % 400); 

                    if (sNode.colIndex < tNode.colIndex) {
                        sX = sNode.x + sNode.width;
                        tX = tNode.x;
                        midX = sX + laneOffset; 
                        pathD = `M ${sX} ${sY} L ${midX} ${sY} L ${midX} ${tY} L ${tX} ${tY}`;
                    } else if (sNode.colIndex > tNode.colIndex) {
                        sX = sNode.x;
                        tX = tNode.x + tNode.width;
                        midX = sX - laneOffset;
                        pathD = `M ${sX} ${sY} L ${midX} ${sY} L ${midX} ${tY} L ${tX} ${tY}`;
                    } else {
                        sX = sNode.x + sNode.width;
                        tX = tNode.x + tNode.width;
                        midX = sX + laneOffset + 80; 
                        pathD = `M ${sX} ${sY} L ${midX} ${sY} L ${midX} ${tY} L ${tX} ${tY}`;
                    }
                } else {
                    // --- THE FIX: PERIMETER ROUTING FOR LONG JUMPS ---
                    // If jumping across middle columns, route entirely above or below the grid
                    const routeTop = ((sY + tY) / 2) < ((maxGridY + minGridY) / 2);
                    
                    // Assign a dedicated horizontal lane so long cables don't overlap each other
                    const safeY = routeTop ? (minGridY - 60 - (index * 25)) : (maxGridY + 60 + (index * 25));

                    sX = sNode.colIndex < tNode.colIndex ? sNode.x + sNode.width : sNode.x;
                    tX = sNode.colIndex < tNode.colIndex ? tNode.x : tNode.x + tNode.width;

                    // Push out slightly before dropping so we don't hug the table wall
                    const sOutX = sNode.colIndex < tNode.colIndex ? sX + 40 + (index * 15 % 80) : sX - 40 - (index * 15 % 80);
                    const tOutX = sNode.colIndex < tNode.colIndex ? tX - 40 - (index * 15 % 80) : tX + 40 + (index * 15 % 80);

                    // Path: Out side -> Vertical drop to perimeter -> Horizontal across -> Vertical up -> In side
                    pathD = `M ${sX} ${sY} L ${sOutX} ${sY} L ${sOutX} ${safeY} L ${tOutX} ${safeY} L ${tOutX} ${tY} L ${tX} ${tY}`;
                }

                return { 
                    sourceId: sNode.id, targetId: tNode.id, 
                    sCol: link.sourceCol, tCol: link.targetCol, 
                    pathD 
                };
            }).filter(d => d);

            function processHighlight(tableId, colName, isClick) {
                d3.selectAll(".link").style("opacity", 0.15).style("stroke", "#64748b").style("stroke-width", "2.5px");
                d3.selectAll(".row-bg").style("fill", ""); 

                const connectedRowIds = new Set();
                connectedRowIds.add(`row-${tableId}-${colName}`);

                const activeLinks = d3.selectAll(".link").filter(l => {
                    const isMatch = (l.sourceId === tableId && l.sCol === colName) || (l.targetId === tableId && l.tCol === colName);
                    if (isMatch) {
                        connectedRowIds.add(`row-${l.sourceId}-${l.sCol}`);
                        connectedRowIds.add(`row-${l.targetId}-${l.tCol}`);
                    }
                    return isMatch;
                });

                activeLinks.style("opacity", 1)
                           .style("stroke", isClick ? "#3b82f6" : "#38bdf8") 
                           .style("stroke-width", "4px")
                           .raise();

                connectedRowIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) d3.select(el).select(".row-bg").style("fill", "#334155"); 
                });

                const originEl = document.getElementById(`row-${tableId}-${colName}`);
                if (originEl) {
                    d3.select(originEl).select(".row-bg").style("fill", isClick ? "#1e40af" : "#475569"); 
                }
            }

            function resetHighlights() {
                d3.selectAll(".link").style("opacity", 1).style("stroke", "#64748b").style("stroke-width", "2.5px");
                d3.selectAll(".row-bg").style("fill", "");
            }

            container.append("g").selectAll(".wire").data(linkData).enter().append("path")
                .attr("class", "link")
                .style("fill", "none")
                .attr("d", d => d.pathD);

            const table = container.append("g").selectAll(".table").data(nodes).enter().append("g")
                .attr("class", "table")
                .attr("transform", d => `translate(${d.x},${d.y})`); 

            table.append("rect").attr("class", "table-bg")
                .attr("width", d => d.width).attr("height", d => d.height).attr("rx", 6);

            table.append("rect").attr("class", "table-header-bg")
                .attr("width", d => d.width).attr("height", d => d.headerHeight).attr("rx", 6);
            table.append("rect").attr("class", "table-header-bg") 
                .attr("y", d => d.headerHeight - 6).attr("width", d => d.width).attr("height", 6);
            table.append("text").attr("class", "title")
                .attr("x", 12).attr("y", 23).text(d => "📊 " + d.id);

            table.append("rect").attr("class", "table-subheader-bg")
                .attr("y", d => d.headerHeight).attr("width", d => d.width).attr("height", d => d.subHeaderHeight);
            
            table.each(function(d) {
                const tg = d3.select(this);
                const shY = d.headerHeight + 17;
                tg.append("text").attr("class", "subheader-text").attr("x", 10).attr("y", shY).text("NAME");
                tg.append("text").attr("class", "subheader-text").attr("x", colNameW + 10).attr("y", shY).text("TYPE");
                tg.append("text").attr("class", "subheader-text").attr("x", colNameW + colTypeW + 10).attr("y", shY).text("KEY");
                tg.append("text").attr("class", "subheader-text").attr("x", colNameW + colTypeW + colKeyW + 10).attr("y", shY).text("ENUM/EXTRA");
            });

            table.each(function (d) {
                const tGroup = d3.select(this);
                const startY = d.headerHeight + d.subHeaderHeight;

                d.columns.forEach((c, i) => {
                    const yPos = startY + (i * d.rowHeight);
                    const defaultRowColor = i % 2 === 0 ? "row-even" : "row-odd";

                    const rowGroup = tGroup.append("g")
                        .attr("id", `row-${d.id}-${c.name}`)
                        .style("cursor", "pointer")
                        .on("mouseover", function() {
                            if (lockedNode) return; 
                            processHighlight(d.id, c.name, false);
                        })
                        .on("mouseout", function() {
                            if (lockedNode) return; 
                            resetHighlights();
                        })
                        .on("click", function(event) {
                            event.stopPropagation(); 
                            const nodeId = `${d.id}-${c.name}`;
                            
                            if (lockedNode === nodeId) {
                                lockedNode = null;
                                processHighlight(d.id, c.name, false); 
                            } else {
                                lockedNode = nodeId;
                                processHighlight(d.id, c.name, true);
                            }
                        });

                    rowGroup.append("rect")
                        .attr("class", `row-bg ${defaultRowColor}`)
                        .attr("y", yPos).attr("width", d.width).attr("height", d.rowHeight);

                    rowGroup.append("line").attr("class", "grid-line")
                        .attr("x1", 0).attr("y1", yPos + d.rowHeight).attr("x2", d.width).attr("y2", yPos + d.rowHeight);

                    rowGroup.append("text").attr("class", "cell-text")
                        .attr("x", 10).attr("y", yPos + 19).text(c.name);

                    rowGroup.append("text").attr("class", "cell-text")
                        .attr("x", colNameW + 10).attr("y", yPos + 19).text(c.type);

                    const isFk = links.some(l => l.source === d.id && l.sourceCol === c.name);
                    let keyStr = [];
                    if (c.isPk) keyStr.push("PK");
                    if (isFk) keyStr.push("FK");
                    
                    rowGroup.append("text").attr("class", "key-text")
                        .attr("x", colNameW + colTypeW + 10).attr("y", yPos + 19).text(keyStr.join(", "));

                    if (c.enumVals) {
                        rowGroup.append("text").attr("class", "enum-text")
                            .attr("x", colNameW + colTypeW + colKeyW + 10).attr("y", yPos + 19)
                            .text(c.enumVals.length > 15 ? c.enumVals.substring(0, 13) + "..." : c.enumVals);
                    }
                });

                const vLines = [colNameW, colNameW + colTypeW, colNameW + colTypeW + colKeyW];
                vLines.forEach(xPos => {
                    tGroup.append("line").attr("class", "grid-line")
                        .attr("x1", xPos).attr("y1", d.headerHeight).attr("x2", xPos).attr("y2", d.height);
                });

                tGroup.append("rect").attr("class", "table-border")
                    .attr("width", d.width).attr("height", d.height).attr("rx", 6);
            });
        }
    </script>
</body>
</html>
